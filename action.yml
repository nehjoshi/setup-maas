name: "Setup MAAS"
author: "Canonical <webteam@canonical.com>"
description: "Install and configure MAAS"
branding:
  icon: "package"
  color: "green"
inputs:
  channel:
    description: "Snap channel to install MAAS from"
    required: false
    default: "latest/edge"
  maas-url:
    description: "URL of MAAS"
    required: false
    default: "http://localhost:5240/MAAS"
  use-maasdb-dump:
    description: "Setup MAAS with a test database dump"
    required: false
    default: "false"
  maasdb-dump-url:
    description: "URL to the MAAS database dump"
    required: false
    default: "https://github.com/canonical/maas-ui-testing/raw/main/db/maasdb-22.04-master-100.dump"

runs:
  using: "composite"
  steps:
    - name: Install MAAS
      shell: bash
      run: |
        set -x
        sudo apt-get update
        sudo apt-get install -y snapd squashfs-tools python3
        sudo systemctl enable snapd
        sudo systemctl start snapd
        # Wait for snapd socket to be ready
        for i in {1..30}; do
          [ -S /run/snapd.socket ] && break
          sleep 1
        done
        # Install snapd snap to get the latest version
        sudo snap install snapd --beta
        # Wait for snap system to be ready
        sudo snap wait system seed.loaded
        # Install core26 snap base (required by maas)
        sudo snap install core26 --edge
        # Install MAAS snap with a workaround for missing python3 symlink in the snap package.
        # The maas snap bundles python3 libraries via stage-packages but omits the base
        # `python3` package, so $SNAP/usr/bin/python3 (unversioned) is absent and the
        # install hook's "#!/usr/bin/env python3" shebang cannot be resolved.
        # Fix: download the snap, inject the symlink, repack, install --dangerous.
        # TODO: Remove once the maas snap adds `python3` to its stage-packages.
        MAAS_DL_DIR=$(mktemp -d)
        sudo snap download maas --channel=${{ inputs.channel }} --target-directory="$MAAS_DL_DIR"
        pushd "$MAAS_DL_DIR"
        sudo unsquashfs maas_*.snap
        # Inject the system python3 binary into the snap so the install hook can find it.
        # TODO: Remove once the maas snap ships python3 in $SNAP/usr/bin/.
        sudo cp "$(which python3)" squashfs-root/usr/bin/python3
        sudo snap pack squashfs-root "$MAAS_DL_DIR"
        sudo snap install --dangerous "$MAAS_DL_DIR"/maas_*.snap
        popd
        sudo snap install maas-test-db --channel=${{ inputs.channel }}
    - name: Fetch MAAS database dump
      if: inputs.use-maasdb-dump == 'true'
      uses: wei/wget@v1
      with:
        args: -O maasdb.dump ${{ inputs.maasdb-dump-url }}
    - name: Set up MAAS with database dump
      if: inputs.use-maasdb-dump == 'true'
      shell: bash
      run: |
        set -x
        sudo sed -i "s/dynamic_shared_memory_type = posix/dynamic_shared_memory_type = sysv/" /var/snap/maas-test-db/common/postgres/data/postgresql.conf
        sudo snap restart maas-test-db
        # Wait for database to be ready after restart
        for i in {1..30}; do
          if sudo snap run --shell maas-test-db.psql -c 'SELECT 1' &>/dev/null; then
            echo "Database is ready"
            break
          fi
          echo "Waiting for database to be ready..."
          sleep 2
        done
        sudo mv maasdb.dump /var/snap/maas-test-db/common/maasdb.dump
        sudo snap run --shell maas-test-db.psql -c 'db-dump restore /var/snap/maas-test-db/common/maasdb.dump maassampledata'
        sudo maas init region+rack --maas-url=${{inputs.maas-url}} --database-uri maas-test-db:///
        sudo sed -i "s/database_name: maasdb/database_name: maassampledata/" /var/snap/maas/current/regiond.conf
        sudo snap restart maas
        # Wait for MAAS to start up after restart
        sleep 10
    - name: Set up MAAS
      if: inputs.use-maasdb-dump == 'false'
      shell: bash
      run: |
        set -x
        sudo maas init region+rack --maas-url=${{inputs.maas-url}} --database-uri maas-test-db:///
