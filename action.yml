name: "Setup MAAS"
author: "Canonical <webteam@canonical.com>"
description: "Install and configure MAAS"
branding:
  icon: "package"
  color: "green"
inputs:
  channel:
    description: "Snap channel to install MAAS from"
    required: false
    default: "latest/edge"
  maas-url:
    description: "URL of MAAS"
    required: false
    default: "http://localhost:5240/MAAS"
  use-maasdb-dump:
    description: "Setup MAAS with a test database dump"
    required: false
    default: "false"
  maasdb-dump-url:
    description: "URL to the MAAS database dump"
    required: false
    default: "https://github.com/canonical/maas-ui-testing/raw/main/db/maasdb-22.04-master-100.dump"

runs:
  using: "composite"
  steps:
    - name: Install MAAS
      shell: bash
      run: |
        set -x
        sudo apt-get update
        sudo apt-get install -y snapd
        sudo systemctl enable snapd
        sudo systemctl start snapd
        # Wait for snapd socket to be ready
        for i in {1..30}; do
          [ -S /run/snapd.socket ] && break
          sleep 1
        done
        # Install snapd snap to get the latest version
        sudo snap install snapd --beta
        # Wait for snap system to be ready
        sudo snap wait system seed.loaded
        # Install core26 snap base (required by maas)
        sudo snap install core26 --edge
        sudo snap install maas --channel=${{ inputs.channel }}
        sudo snap install maas-test-db --channel=${{ inputs.channel }}
    - name: Fetch MAAS database dump
      if: inputs.use-maasdb-dump == 'true'
      uses: wei/wget@v1
      with:
        args: -O maasdb.dump ${{ inputs.maasdb-dump-url }}
    - name: Verify MAAS database dump
      if: inputs.use-maasdb-dump == 'true'
      shell: bash
      run: |
        set -x
        echo "=== Verifying downloaded dump file ==="
        ls -lh maasdb.dump
        file maasdb.dump
        # Check if it's a valid PostgreSQL dump
        head -c 100 maasdb.dump | od -c | head
    - name: Set up MAAS with database dump
      if: inputs.use-maasdb-dump == 'true'
      shell: bash
      run: |
        set -x
        sudo sed -i "s/dynamic_shared_memory_type = posix/dynamic_shared_memory_type = sysv/" /var/snap/maas-test-db/common/postgres/data/postgresql.conf
        sudo snap restart maas-test-db
        # Wait for database to be ready
        sleep 10
        # Verify dump file before move
        echo "=== Verifying dump file before move ==="
        ls -lh maasdb.dump
        file maasdb.dump
        sudo mv maasdb.dump /var/snap/maas-test-db/common/maasdb.dump
        # Verify dump file after move
        echo "=== Verifying dump file after move ==="
        sudo ls -lh /var/snap/maas-test-db/common/maasdb.dump
        sudo file /var/snap/maas-test-db/common/maasdb.dump
        # Restore the database dump
        echo "=== Restoring database dump ==="
        sudo snap run --shell maas-test-db.psql -c 'db-dump restore /var/snap/maas-test-db/common/maasdb.dump maassampledata'
        # Verify database was restored
        echo "=== Verifying restored database ==="
        sudo snap run --shell maas-test-db.psql -c '\l' | grep -E 'maasdb|maassampledata'
        sudo snap run --shell maas-test-db.psql -d maassampledata -c '\dt' | head -20
        # Initialize MAAS
        echo "=== Initializing MAAS ==="
        sudo maas init region+rack --maas-url=${{inputs.maas-url}} --database-uri maas-test-db:///
        # Verify regiond config
        echo "=== Verifying MAAS regiond config before update ==="
        sudo cat /var/snap/maas/current/regiond.conf | grep database
        sudo sed -i "s/database_name: maasdb/database_name: maassampledata/" /var/snap/maas/current/regiond.conf
        echo "=== Verifying MAAS regiond config after update ==="
        sudo cat /var/snap/maas/current/regiond.conf | grep database
        sudo snap restart maas
    - name: Set up MAAS
      if: inputs.use-maasdb-dump == 'false'
      shell: bash
      run: |
        set -x
        sudo maas init region+rack --maas-url=${{inputs.maas-url}} --database-uri maas-test-db:///
