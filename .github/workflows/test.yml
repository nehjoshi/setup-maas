name: Tests
on: [push, pull_request, workflow_dispatch]
jobs:
  setup-maas:
    name: Setup MAAS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
      - name: Wait for MAAS API
        run: |
          for i in {1..60}; do
            status_code=$(curl -L http://localhost:5240/MAAS/api/2.0/version/ -o /dev/null -w "%{http_code}" -s 2>/dev/null || echo "000")
            if [[ "$status_code" == "200" ]]; then
              echo "MAAS API is ready"
              exit 0
            fi
            echo "MAAS API not ready yet (status: $status_code), waiting..."
            sleep 5
          done
          echo "MAAS API failed to become ready"
          exit 1
      - name: Create MAAS admin
        run: lxc exec maas-backend -- maas createadmin --username=admin --password=test --email=fake@example.org
  setup-maas-with-db-dump:
    name: Setup MAAS with dump database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          use-maasdb-dump: true
      - name: Wait for MAAS API
        run: |
          for i in {1..60}; do
            status_code=$(curl -L http://localhost:5240/MAAS/api/2.0/version/ -o /dev/null -w "%{http_code}" -s 2>/dev/null || echo "000")
            if [[ "$status_code" == "200" ]]; then
              echo "MAAS API is ready"
              exit 0
            fi
            echo "MAAS API not ready yet (status: $status_code), waiting..."
            sleep 5
          done
          echo "MAAS API failed to become ready"
          exit 1
      - name: Verify admin user exists (from dump)
        run: lxc exec maas-backend -- maas admin users list | grep -q admin && echo "Admin user already exists from dump" || echo "Admin user not found"
